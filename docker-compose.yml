version: '3.8'

# ============================================================================
# PulsarCD - Local Development / Single Host Deployment
#
# NO CONFIG FILE NEEDED - All configuration is via environment variables!
# For Swarm deployments, use devops/docker-compose.swarm.yml instead.
# ============================================================================

services:
  # OpenSearch for log storage and search
  opensearch:
    image: opensearchproject/opensearch:3.4.0
    container_name: pulsarcd-opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "DISABLE_SECURITY_PLUGIN=true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    networks:
      - pulsarcd-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20


  # PulsarCD Backend & Frontend
  pulsarcd:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pulsarcd-app
    # Run as root to access Docker socket (or use group_add with docker GID)
    user: root
    ports:
      - "5000:8000"
    volumes:
      # Mount Docker socket for Docker API access
      - /var/run/docker.sock:/var/run/docker.sock
      # Optional: Mount SSH keys for remote host access (SSH mode)
      # - ~/.ssh:/root/.ssh:ro
    environment:
      # ========== All configuration via environment variables ==========
      - PULSARCD_DEBUG=false

      # OpenSearch configuration
      - PULSARCD_OPENSEARCH__HOSTS=["http://opensearch:9200"]
      - PULSARCD_OPENSEARCH__INDEX_PREFIX=pulsarcd

      # AI/vLLM configuration
      - PULSARCD_AI__MODEL=txn545/Qwen3.5-122B-A10B-NVFP4
      - PULSARCD_VLLM_URL=https://llm-dev.methodinfo.fr

      # Collector settings
      - PULSARCD_COLLECTOR__LOG_INTERVAL_SECONDS=30
      - PULSARCD_COLLECTOR__METRICS_INTERVAL_SECONDS=15
      - PULSARCD_COLLECTOR__LOG_LINES_PER_FETCH=500
      - PULSARCD_COLLECTOR__RETENTION_DAYS=7

      # Host configuration (JSON array)
      # Local Docker mode - monitors containers on this host via Docker socket
      - |
        PULSARCD_HOSTS=[
          {
            "name": "local-docker",
            "mode": "docker",
            "docker_url": "unix:///var/run/docker.sock"
          }
        ]

      # ========== Alternative configurations (uncomment as needed) ==========
      #
      # SSH mode - connect to remote hosts via SSH:
      # - |
      #   PULSARCD_HOSTS=[
      #     {"name": "local-docker", "mode": "docker"},
      #     {"name": "server-1", "mode": "ssh", "hostname": "192.168.1.10", "username": "deploy"},
      #     {"name": "server-2", "mode": "ssh", "hostname": "192.168.1.11", "username": "deploy"}
      #   ]
      #
      # Swarm mode with auto-discovery (discovers all Swarm nodes automatically):
      # - |
      #   PULSARCD_HOSTS=[
      #     {
      #       "name": "swarm-manager",
      #       "mode": "docker",
      #       "docker_url": "unix:///var/run/docker.sock",
      #       "swarm_manager": true,
      #       "swarm_routing": true,
      #       "swarm_autodiscover": true
      #     }
      #   ]

    extra_hosts:
      # Allows container to reach the host machine via "host.docker.internal"
      - "host.docker.internal:host-gateway"
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - pulsarcd-net
    restart: unless-stopped

networks:
  pulsarcd-net:
    driver: bridge

volumes:
  opensearch-data:
    driver: local
