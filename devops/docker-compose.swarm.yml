version: '3.9'

# ============================================================================
# LogsCrawler - Docker Swarm Deployment (Agent-Based Architecture)
# Deploy with: docker stack deploy -c docker-compose.swarm.yml logscrawler
#
# IMPORTANT: Copy .env.example to .env and configure before deploying
#
# Architecture:
# - Backend: API server (read-only from OpenSearch, action queue)
# - Agent: Deployed on EVERY node (global mode), collects logs/metrics locally
# - OpenSearch: Storage for logs and metrics
#
# Security: Backend has NO access to Docker sockets. Agents run locally on
# each node and push data directly to OpenSearch.
# ============================================================================

services:
  # ==========================================================================
  # OpenSearch - Log and metrics storage
  # ==========================================================================
  opensearch:
    image: opensearchproject/opensearch:3.4.0
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "DISABLE_SECURITY_PLUGIN=true"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == ${OPENSEARCH_NODE_HOSTNAME:-server-d}
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # ==========================================================================
  # LogsCrawler Backend - API Server
  # Docker socket mounted read-only for Swarm API queries (list containers/services)
  # Actual container operations (start/stop/exec) go through agents
  # ==========================================================================
  swarm-manager:
    image: ${DOCKER_REGISTRY_URL}/logscrawler:latest
    build:
      context: ..
      dockerfile: Dockerfile
      target: production
    # Run as root to access Docker socket for Swarm API queries
    user: root
    extra_hosts:
      # Map 'dockerhost' to the Docker host IP for SSH access
      - "dockerhost:host-gateway"
    volumes:
      # Mount SSH keys for SSH to host
      - ${SSH_KEYS_PATH:-/home/user/.ssh}:/root/.ssh:ro
      # Docker socket for Swarm API queries (read-only)
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - LOGSCRAWLER_DEBUG=false

      # OpenSearch configuration (use stack-prefixed name)
      - LOGSCRAWLER_OPENSEARCH__HOSTS=["http://opensearch:9200"]
      - LOGSCRAWLER_OPENSEARCH__INDEX_PREFIX=logscrawler

      # AI/vLLM configuration
      - LOGSCRAWLER_AI__MODEL=${VLLM_MODEL:-txn545/Qwen3.5-122B-A10B-NVFP4}
      - LOGSCRAWLER_VLLM_URL=${VLLM_URL:-http://vllm-dev-service:8000}

      # Collector settings - agents handle log/metrics collection
      - LOGSCRAWLER_COLLECTOR__AGENTS_ONLY=true
      - LOGSCRAWLER_COLLECTOR__RETENTION_DAYS=${LOG_RETENTION_DAYS:-7}

      # GitHub integration for Stacks tab
      - LOGSCRAWLER_GITHUB__TOKEN=${LOGSCRAWLER_GITHUB__TOKEN}
      - LOGSCRAWLER_GITHUB__USERNAME=${LOGSCRAWLER_GITHUB__USERNAME}
      - LOGSCRAWLER_GITHUB__USEREMAIL=${LOGSCRAWLER_GITHUB__USEREMAIL}
      - LOGSCRAWLER_GITHUB__REPOS_PATH=${LOGSCRAWLER_GITHUB__REPOS_PATH:-/home/user}
      - LOGSCRAWLER_GITHUB__SCRIPTS_PATH=${LOGSCRAWLER_GITHUB__SCRIPTS_PATH:-/home/user/scripts}
      - LOGSCRAWLER_GITHUB__SSH_HOST=${LOGSCRAWLER_GITHUB__SSH_HOST:-dockerhost}
      - LOGSCRAWLER_GITHUB__SSH_USER=${LOGSCRAWLER_GITHUB__SSH_USER:-user}
      # Docker registry for build/push operations
      - LOGSCRAWLER_GITHUB__REGISTRY_URL=${DOCKER_REGISTRY_URL}
      - LOGSCRAWLER_GITHUB__REGISTRY_USERNAME=${DOCKER_REGISTRY_USERNAME}
      - LOGSCRAWLER_GITHUB__REGISTRY_PASSWORD=${DOCKER_REGISTRY_PASSWORD}

      # Authentication
      - LOGSCRAWLER_AUTH__USERNAME=${LOGSCRAWLER_AUTH__USERNAME:-admin}
      - LOGSCRAWLER_AUTH__PASSWORD=${LOGSCRAWLER_AUTH__PASSWORD:-changeme}
      - LOGSCRAWLER_AUTH__JWT_SECRET=${LOGSCRAWLER_AUTH__JWT_SECRET:-}
      - LOGSCRAWLER_AUTH__JWT_EXPIRY_HOURS=${LOGSCRAWLER_AUTH__JWT_EXPIRY_HOURS:-24}
      - LOGSCRAWLER_AUTH__AGENT_KEY=${LOGSCRAWLER_AUTH__AGENT_KEY:-}

      - LOGSCRAWLER_MCP__API_KEY=${LOGSCRAWLER_MCP__API_KEY:-}
      # Swarm agent notification (repair tasks on failure)
      - LOGSCRAWLER_SWARM__SECRET_KEY=${LOGSCRAWLER_SWARM__SECRET_KEY:-}
      # Swarm manager config - queries Swarm API to list all containers/services
      # Collection is disabled (agents_only=true), this is only for listing
      - LOGSCRAWLER_HOSTS=[{"name":"swarm-manager","mode":"docker","docker_url":"unix:///var/run/docker.sock","swarm_manager":true,"swarm_autodiscover":true}]
    networks:
      - proxy
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - opensearch
    deploy:
      replicas: 1
      labels:
        # Enable Traefik
        - "traefik.enable=true"

        # Define service port
        - "traefik.http.services.logscrawler.loadbalancer.server.port=8000"

        # HTTPS Router (main)
        - "traefik.http.routers.logscrawler.rule=Host(`${TRAEFIK_HOST}`)"
        - "traefik.http.routers.logscrawler.entrypoints=websecure"
        - "traefik.http.routers.logscrawler.tls.certresolver=letsencrypt"
        - "traefik.http.routers.logscrawler.middlewares=global@file"
        - "traefik.http.routers.logscrawler.service=logscrawler"
        - "traefik.http.routers.logscrawler.priority=1"

        # HTTPS Router (WebSocket terminal) - bypasses WAF which blocks WS upgrades
        - "traefik.http.routers.logscrawler-ws.rule=Host(`${TRAEFIK_HOST}`) && PathPrefix(`/api/terminal/ws`)"
        - "traefik.http.routers.logscrawler-ws.entrypoints=websecure"
        - "traefik.http.routers.logscrawler-ws.tls.certresolver=letsencrypt"
        - "traefik.http.routers.logscrawler-ws.middlewares=security-headers@file"
        - "traefik.http.routers.logscrawler-ws.service=logscrawler"
        - "traefik.http.routers.logscrawler-ws.priority=100"

        # HTTP Router (redirect to HTTPS)
        - "traefik.http.routers.logscrawler-http.rule=Host(`${TRAEFIK_HOST}`)"
        - "traefik.http.routers.logscrawler-http.entrypoints=web"
        - "traefik.http.routers.logscrawler-http.middlewares=redirect-to-https@file"
        - "traefik.http.routers.logscrawler-http.service=noop@internal"
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.hostname == ${BACKEND_NODE_HOSTNAME:-server-b}

  # ==========================================================================
  # Test - Build target for running tests (not deployed)
  # Usage: docker compose -f docker-compose.swarm.yml run --rm test
  # ==========================================================================
  test:
    image: ${DOCKER_REGISTRY_URL}/logscrawler-test:latest
    build:
      context: ..
      dockerfile: Dockerfile
      target: test
    deploy:
      replicas: 0

  # ==========================================================================
  # LogsCrawler Agent - Deployed on EVERY node (global mode)
  # Collects Docker logs/metrics locally and pushes to OpenSearch
  # ==========================================================================
  agent:
    image: ${DOCKER_REGISTRY_URL}/logscrawler-agent:latest
    build:
      context: ..
      dockerfile: Dockerfile.agent
    # Run as root to access Docker socket
    user: root
    privileged: true
    pid: host
    volumes:
      # Mount Docker socket for LOCAL container access only
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # System and GPU device access for monitoring
      - /sys:/sys:ro
    environment:
      # AMD GPU visibility
      - AMD_VISIBLE_DEVICES=all
      - NVIDIA_VISIBLE_DEVICES=all
      # Agent ID: use node hostname (set by Swarm)
      - AGENT_AGENT_ID={{.Node.Hostname}}

      # Backend URL for polling actions (use stack-prefixed name)
      - AGENT_BACKEND_URL=http://swarm-manager:8000

      # OpenSearch configuration (use stack-prefixed name)
      - AGENT_OPENSEARCH__HOSTS=["http://opensearch:9200"]
      - AGENT_OPENSEARCH__INDEX_PREFIX=logscrawler

      # Docker socket path (inside container)
      - AGENT_DOCKER_URL=unix:///var/run/docker.sock

      # Collection intervals
      - AGENT_LOG_INTERVAL=30
      - AGENT_METRICS_INTERVAL=15
      - AGENT_ACTION_POLL_INTERVAL=2

      # Initial log lines to fetch
      - AGENT_LOG_LINES_PER_FETCH=500

      # Authentication key for swarm-manager API (must match LOGSCRAWLER_AUTH__AGENT_KEY)
      - AGENT_AUTH_KEY=${LOGSCRAWLER_AUTH__AGENT_KEY:-}
    networks:
      - internal
    depends_on:
      - opensearch
      - swarm-manager
    deploy:
      # Deploy on ALL nodes in the Swarm
      mode: global
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

# ============================================================================
# Volumes
# ============================================================================
volumes:
  opensearch-data:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  proxy:
    external: true
  internal:
    driver: overlay
    attachable: true
